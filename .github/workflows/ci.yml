name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Typecheck, Lint, Test, Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Install dependencies
        run: npm ci

      - name: Install AWS dependencies
        working-directory: aws
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: AWS type check
        working-directory: aws
        run: npm run typecheck

      - name: AWS tests
        working-directory: aws
        run: npm run test

      - name: AWS build
        working-directory: aws
        run: npm run build

      - name: Build
        run: npm run build
