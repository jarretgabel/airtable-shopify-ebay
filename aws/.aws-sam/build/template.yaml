AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Parameters:
  AirtableApiKeySsmPath:
    Type: String
  AirtableBaseId:
    Type: String
  AllowedAirtableTableName:
    Type: String
  AllowedAirtableViewId:
    Type: String
  AirtableUsersTableRef:
    Type: String
  AirtableUsersTableName:
    Type: String
  AirtableApprovalTableRef:
    Type: String
  AirtableApprovalTableName:
    Type: String
  AirtableShopifyApprovalTableRef:
    Type: String
  AirtableShopifyApprovalTableName:
    Type: String
  AirtableCombinedListingsTableRef:
    Type: String
  AirtableCombinedListingsTableName:
    Type: String
  ShopifyStoreDomain:
    Type: String
  ShopifyAccessTokenSsmPath:
    Type: String
  JotformApiKeySsmPath:
    Type: String
  GithubTokenSsmPath:
    Type: String
    Default: ''
  OpenAiApiKeySsmPath:
    Type: String
    Default: ''
  GoogleGmailAccessTokenSsmPath:
    Type: String
    Default: ''
  GoogleGmailFromEmail:
    Type: String
    Default: ''
Conditions:
  HasGithubTokenSsmPath:
    Fn::Not:
    - Fn::Equals:
      - Ref: GithubTokenSsmPath
      - ''
  HasOpenAiApiKeySsmPath:
    Fn::Not:
    - Fn::Equals:
      - Ref: OpenAiApiKeySsmPath
      - ''
  HasGoogleGmailAccessTokenSsmPath:
    Fn::Not:
    - Fn::Equals:
      - Ref: GoogleGmailAccessTokenSsmPath
      - ''
Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures:
    - arm64
    Environment:
      Variables:
        AIRTABLE_API_KEY:
          Fn::Sub: '{{resolve:ssm-secure:${AirtableApiKeySsmPath}}}'
        AIRTABLE_BASE_ID:
          Ref: AirtableBaseId
        ALLOWED_AIRTABLE_TABLE_NAME:
          Ref: AllowedAirtableTableName
        ALLOWED_AIRTABLE_VIEW_ID:
          Ref: AllowedAirtableViewId
        AIRTABLE_USERS_TABLE_REF:
          Ref: AirtableUsersTableRef
        AIRTABLE_USERS_TABLE_NAME:
          Ref: AirtableUsersTableName
        AIRTABLE_APPROVAL_TABLE_REF:
          Ref: AirtableApprovalTableRef
        AIRTABLE_APPROVAL_TABLE_NAME:
          Ref: AirtableApprovalTableName
        AIRTABLE_SHOPIFY_APPROVAL_TABLE_REF:
          Ref: AirtableShopifyApprovalTableRef
        AIRTABLE_SHOPIFY_APPROVAL_TABLE_NAME:
          Ref: AirtableShopifyApprovalTableName
        AIRTABLE_COMBINED_LISTINGS_TABLE_REF:
          Ref: AirtableCombinedListingsTableRef
        AIRTABLE_COMBINED_LISTINGS_TABLE_NAME:
          Ref: AirtableCombinedListingsTableName
        SHOPIFY_STORE_DOMAIN:
          Ref: ShopifyStoreDomain
        SHOPIFY_ACCESS_TOKEN:
          Fn::Sub: '{{resolve:ssm-secure:${ShopifyAccessTokenSsmPath}}}'
        JOTFORM_API_KEY:
          Fn::Sub: '{{resolve:ssm-secure:${JotformApiKeySsmPath}}}'
        GITHUB_TOKEN:
          Fn::If:
          - HasGithubTokenSsmPath
          - Fn::Sub: '{{resolve:ssm-secure:${GithubTokenSsmPath}}}'
          - ''
        OPENAI_API_KEY:
          Fn::If:
          - HasOpenAiApiKeySsmPath
          - Fn::Sub: '{{resolve:ssm-secure:${OpenAiApiKeySsmPath}}}'
          - ''
        GOOGLE_GMAIL_ACCESS_TOKEN:
          Fn::If:
          - HasGoogleGmailAccessTokenSsmPath
          - Fn::Sub: '{{resolve:ssm-secure:${GoogleGmailAccessTokenSsmPath}}}'
          - ''
        GOOGLE_GMAIL_FROM_EMAIL:
          Ref: GoogleGmailFromEmail
Resources:
  AppHttpApi:
    Type: AWS::Serverless::HttpApi
  ShopifyGetProductsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyGetProductsFunction
    Properties:
      CodeUri: ShopifyGetProductsFunction
      Handler: getProducts.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/shopify/products
  ShopifyGetProductFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyGetProductFunction
    Properties:
      CodeUri: ShopifyGetProductFunction
      Handler: getProduct.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/shopify/products/{productId}
  ShopifyGetCollectionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyGetCollectionsFunction
    Properties:
      CodeUri: ShopifyGetCollectionsFunction
      Handler: getCollections.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/shopify/collections
  ShopifySearchCollectionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifySearchCollectionsFunction
    Properties:
      CodeUri: ShopifySearchCollectionsFunction
      Handler: searchCollections.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/shopify/collections/search
  ShopifySearchTaxonomyCategoriesFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifySearchTaxonomyCategoriesFunction
    Properties:
      CodeUri: ShopifySearchTaxonomyCategoriesFunction
      Handler: searchTaxonomyCategories.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/shopify/taxonomy-categories/search
  ShopifyResolveTaxonomyCategoryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyResolveTaxonomyCategoryFunction
    Properties:
      CodeUri: ShopifyResolveTaxonomyCategoryFunction
      Handler: resolveTaxonomyCategory.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/shopify/taxonomy-categories/resolve
  ShopifyUpsertProductFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyUpsertProductFunction
    Properties:
      CodeUri: ShopifyUpsertProductFunction
      Handler: upsertProduct.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/shopify/product-set
  ShopifyUpsertProductWithCollectionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyUpsertProductWithCollectionsFunction
    Properties:
      CodeUri: ShopifyUpsertProductWithCollectionsFunction
      Handler: upsertProductWithCollections.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/shopify/product-set-with-collections
  ShopifyAddProductToCollectionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyAddProductToCollectionsFunction
    Properties:
      CodeUri: ShopifyAddProductToCollectionsFunction
      Handler: addProductToCollections.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/shopify/products/{productId}/collections
  ShopifyUpdateProductCategoryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyUpdateProductCategoryFunction
    Properties:
      CodeUri: ShopifyUpdateProductCategoryFunction
      Handler: updateProductCategory.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/shopify/products/{productId}/category
  ShopifyUploadImageFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: ShopifyUploadImageFunction
    Properties:
      CodeUri: ShopifyUploadImageFunction
      Handler: uploadImage.handler
      Timeout: 30
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/shopify/images
  JotformGetFormsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: JotformGetFormsFunction
    Properties:
      CodeUri: JotformGetFormsFunction
      Handler: getForms.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/jotform/forms
  JotformGetFormSubmissionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: JotformGetFormSubmissionsFunction
    Properties:
      CodeUri: JotformGetFormSubmissionsFunction
      Handler: getFormSubmissions.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/jotform/forms/{formId}/submissions
  AirtableGetListingsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: AirtableGetListingsFunction
    Properties:
      CodeUri: AirtableGetListingsFunction
      Handler: getListings.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/airtable/listings
  AirtableGetConfiguredRecordsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: AirtableGetConfiguredRecordsFunction
    Properties:
      CodeUri: AirtableGetConfiguredRecordsFunction
      Handler: getConfiguredRecords.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/airtable/configured-records
  AirtableGetConfiguredMetadataFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: AirtableGetConfiguredMetadataFunction
    Properties:
      CodeUri: AirtableGetConfiguredMetadataFunction
      Handler: getConfiguredMetadata.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: GET
            Path: /api/airtable/configured-metadata
  AirtableCreateConfiguredRecordFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: AirtableCreateConfiguredRecordFunction
    Properties:
      CodeUri: AirtableCreateConfiguredRecordFunction
      Handler: upsertConfiguredRecord.createHandler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/airtable/configured-records/{source}
  AirtableUpdateConfiguredRecordFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: AirtableUpdateConfiguredRecordFunction
    Properties:
      CodeUri: AirtableUpdateConfiguredRecordFunction
      Handler: upsertConfiguredRecord.updateHandler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: PATCH
            Path: /api/airtable/configured-records/{source}/{recordId}
  AirtableDeleteConfiguredRecordFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: AirtableDeleteConfiguredRecordFunction
    Properties:
      CodeUri: AirtableDeleteConfiguredRecordFunction
      Handler: deleteConfiguredRecord.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: DELETE
            Path: /api/airtable/configured-records/{source}/{recordId}
  AirtableUploadConfiguredAttachmentFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: AirtableUploadConfiguredAttachmentFunction
    Properties:
      CodeUri: AirtableUploadConfiguredAttachmentFunction
      Handler: uploadConfiguredAttachment.handler
      Timeout: 30
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/airtable/configured-attachments/{source}/{recordId}/{fieldId}
  AiIdentifyEquipmentFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: AiIdentifyEquipmentFunction
    Properties:
      CodeUri: AiIdentifyEquipmentFunction
      Handler: identifyEquipment.handler
      Timeout: 30
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/ai/identify-equipment
  GmailSendFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      SamResourceId: GmailSendFunction
    Properties:
      CodeUri: GmailSendFunction
      Handler: send.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId:
              Ref: AppHttpApi
            Method: POST
            Path: /api/gmail/send
Outputs:
  AppApiUrl:
    Value:
      Fn::Sub: https://${AppHttpApi}.execute-api.${AWS::Region}.amazonaws.com
