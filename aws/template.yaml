AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  AirtableApiKey:
    Type: String
    NoEcho: true
  AirtableBaseId:
    Type: String
  AllowedAirtableTableName:
    Type: String
  AllowedAirtableViewId:
    Type: String
  AirtableUsersTableRef:
    Type: String
  AirtableUsersTableName:
    Type: String
  AirtableApprovalTableRef:
    Type: String
  AirtableApprovalTableName:
    Type: String
  AirtableShopifyApprovalTableRef:
    Type: String
  AirtableShopifyApprovalTableName:
    Type: String
  AirtableCombinedListingsTableRef:
    Type: String
  AirtableCombinedListingsTableName:
    Type: String
  ShopifyStoreDomain:
    Type: String
  ShopifyAccessToken:
    Type: String
    NoEcho: true
  EbayEnv:
    Type: String
    Default: ''
  EbayClientId:
    Type: String
    Default: ''
  EbayClientSecret:
    Type: String
    NoEcho: true
    Default: ''
  EbayRefreshToken:
    Type: String
    NoEcho: true
    Default: ''
  EbayAuthHost:
    Type: String
    Default: ''
  EbayAppScope:
    Type: String
    Default: ''
  EbayLocationKey:
    Type: String
    Default: ''
  EbayLocationName:
    Type: String
    Default: ''
  EbayLocationCountry:
    Type: String
    Default: ''
  EbayLocationPostalCode:
    Type: String
    Default: ''
  EbayLocationCity:
    Type: String
    Default: ''
  EbayLocationState:
    Type: String
    Default: ''
  EbayFulfillmentPolicyId:
    Type: String
    Default: ''
  EbayPaymentPolicyId:
    Type: String
    Default: ''
  EbayReturnPolicyId:
    Type: String
    Default: ''
  EbayListingApi:
    Type: String
    Default: inventory
  JotformApiKey:
    Type: String
    NoEcho: true
  GithubToken:
    Type: String
    NoEcho: true
    Default: ''
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Default: ''
  GoogleGmailAccessToken:
    Type: String
    NoEcho: true
    Default: ''
  GoogleGmailFromEmail:
    Type: String
    Default: ''
  AnalyticsForwardEndpoint:
    Type: String
    Default: ''
  AppAuthTokenSecret:
    Type: String
    NoEcho: true
  AppAuthCookieSecureMode:
    Type: String
    Default: auto
  AppAuthCookieSameSite:
    Type: String
    Default: Lax
  AppAuthCookieDomain:
    Type: String
    Default: ''

Conditions:
  HasGithubToken: !Not [!Equals [!Ref GithubToken, '']]
  HasOpenAiApiKey: !Not [!Equals [!Ref OpenAiApiKey, '']]
  HasGoogleGmailAccessToken: !Not [!Equals [!Ref GoogleGmailAccessToken, '']]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        AIRTABLE_API_KEY: !Ref AirtableApiKey
        AIRTABLE_BASE_ID: !Ref AirtableBaseId
        ALLOWED_AIRTABLE_TABLE_NAME: !Ref AllowedAirtableTableName
        ALLOWED_AIRTABLE_VIEW_ID: !Ref AllowedAirtableViewId
        AIRTABLE_USERS_TABLE_REF: !Ref AirtableUsersTableRef
        AIRTABLE_USERS_TABLE_NAME: !Ref AirtableUsersTableName
        AIRTABLE_APPROVAL_TABLE_REF: !Ref AirtableApprovalTableRef
        AIRTABLE_APPROVAL_TABLE_NAME: !Ref AirtableApprovalTableName
        AIRTABLE_SHOPIFY_APPROVAL_TABLE_REF: !Ref AirtableShopifyApprovalTableRef
        AIRTABLE_SHOPIFY_APPROVAL_TABLE_NAME: !Ref AirtableShopifyApprovalTableName
        AIRTABLE_COMBINED_LISTINGS_TABLE_REF: !Ref AirtableCombinedListingsTableRef
        AIRTABLE_COMBINED_LISTINGS_TABLE_NAME: !Ref AirtableCombinedListingsTableName
        SHOPIFY_STORE_DOMAIN: !Ref ShopifyStoreDomain
        SHOPIFY_ACCESS_TOKEN: !Ref ShopifyAccessToken
        EBAY_ENV: !Ref EbayEnv
        EBAY_CLIENT_ID: !Ref EbayClientId
        EBAY_CLIENT_SECRET: !Ref EbayClientSecret
        EBAY_REFRESH_TOKEN: !Ref EbayRefreshToken
        EBAY_AUTH_HOST: !Ref EbayAuthHost
        EBAY_APP_SCOPE: !Ref EbayAppScope
        EBAY_LOCATION_KEY: !Ref EbayLocationKey
        EBAY_LOCATION_NAME: !Ref EbayLocationName
        EBAY_LOCATION_COUNTRY: !Ref EbayLocationCountry
        EBAY_LOCATION_POSTAL_CODE: !Ref EbayLocationPostalCode
        EBAY_LOCATION_CITY: !Ref EbayLocationCity
        EBAY_LOCATION_STATE: !Ref EbayLocationState
        EBAY_FULFILLMENT_POLICY_ID: !Ref EbayFulfillmentPolicyId
        EBAY_PAYMENT_POLICY_ID: !Ref EbayPaymentPolicyId
        EBAY_RETURN_POLICY_ID: !Ref EbayReturnPolicyId
        EBAY_LISTING_API: !Ref EbayListingApi
        JOTFORM_API_KEY: !Ref JotformApiKey
        GITHUB_TOKEN: !If
          - HasGithubToken
          - !Ref GithubToken
          - ''
        OPENAI_API_KEY: !If
          - HasOpenAiApiKey
          - !Ref OpenAiApiKey
          - ''
        GOOGLE_GMAIL_ACCESS_TOKEN: !If
          - HasGoogleGmailAccessToken
          - !Ref GoogleGmailAccessToken
          - ''
        GOOGLE_GMAIL_FROM_EMAIL: !Ref GoogleGmailFromEmail
        ANALYTICS_FORWARD_ENDPOINT: !Ref AnalyticsForwardEndpoint
        APP_AUTH_TOKEN_SECRET: !Ref AppAuthTokenSecret
        APP_AUTH_COOKIE_SECURE_MODE: !Ref AppAuthCookieSecureMode
        APP_AUTH_COOKIE_SAME_SITE: !Ref AppAuthCookieSameSite
        APP_AUTH_COOKIE_DOMAIN: !Ref AppAuthCookieDomain

Resources:
  AppHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - http://127.0.0.1:3000
          - http://localhost:3000
        AllowHeaders:
          - content-type
          - authorization
          - cookie
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS
        AllowCredentials: true

  ShopifyGetProductsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/getProducts.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/shopify/products

  ShopifyGetProductFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/getProduct.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/shopify/products/{productId}

  ShopifyGetCollectionsFunction:
