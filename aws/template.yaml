AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Parameters:
  AirtableApiKey:
    Type: String
    NoEcho: true
  AirtableBaseId:
    Type: String
  AllowedAirtableTableName:
    Type: String
  AllowedAirtableViewId:
    Type: String
  AirtableUsersTableRef:
    Type: String
  AirtableUsersTableName:
    Type: String
  AirtableApprovalTableRef:
    Type: String
  AirtableApprovalTableName:
    Type: String
  AirtableShopifyApprovalTableRef:
    Type: String
  AirtableShopifyApprovalTableName:
    Type: String
  AirtableCombinedListingsTableRef:
    Type: String
  AirtableCombinedListingsTableName:
    Type: String
  ShopifyStoreDomain:
    Type: String
  ShopifyAccessToken:
    Type: String
    NoEcho: true
  JotformApiKey:
    Type: String
    NoEcho: true
  GithubToken:
    Type: String
    NoEcho: true
    Default: ''
  OpenAiApiKey:
    Type: String
    NoEcho: true
    Default: ''
  GoogleGmailAccessToken:
    Type: String
    NoEcho: true
    Default: ''
  GoogleGmailFromEmail:
    Type: String
    Default: ''

Conditions:
  HasGithubToken: !Not [!Equals [!Ref GithubToken, '']]
  HasOpenAiApiKey: !Not [!Equals [!Ref OpenAiApiKey, '']]
  HasGoogleGmailAccessToken: !Not [!Equals [!Ref GoogleGmailAccessToken, '']]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 256
    Architectures:
      - arm64
    Environment:
      Variables:
        AIRTABLE_API_KEY: !Ref AirtableApiKey
        AIRTABLE_BASE_ID: !Ref AirtableBaseId
        ALLOWED_AIRTABLE_TABLE_NAME: !Ref AllowedAirtableTableName
        ALLOWED_AIRTABLE_VIEW_ID: !Ref AllowedAirtableViewId
        AIRTABLE_USERS_TABLE_REF: !Ref AirtableUsersTableRef
        AIRTABLE_USERS_TABLE_NAME: !Ref AirtableUsersTableName
        AIRTABLE_APPROVAL_TABLE_REF: !Ref AirtableApprovalTableRef
        AIRTABLE_APPROVAL_TABLE_NAME: !Ref AirtableApprovalTableName
        AIRTABLE_SHOPIFY_APPROVAL_TABLE_REF: !Ref AirtableShopifyApprovalTableRef
        AIRTABLE_SHOPIFY_APPROVAL_TABLE_NAME: !Ref AirtableShopifyApprovalTableName
        AIRTABLE_COMBINED_LISTINGS_TABLE_REF: !Ref AirtableCombinedListingsTableRef
        AIRTABLE_COMBINED_LISTINGS_TABLE_NAME: !Ref AirtableCombinedListingsTableName
        SHOPIFY_STORE_DOMAIN: !Ref ShopifyStoreDomain
        SHOPIFY_ACCESS_TOKEN: !Ref ShopifyAccessToken
        JOTFORM_API_KEY: !Ref JotformApiKey
        GITHUB_TOKEN: !If
          - HasGithubToken
          - !Ref GithubToken
          - ''
        OPENAI_API_KEY: !If
          - HasOpenAiApiKey
          - !Ref OpenAiApiKey
          - ''
        GOOGLE_GMAIL_ACCESS_TOKEN: !If
          - HasGoogleGmailAccessToken
          - !Ref GoogleGmailAccessToken
          - ''
        GOOGLE_GMAIL_FROM_EMAIL: !Ref GoogleGmailFromEmail

Resources:
  AppHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - http://127.0.0.1:3000
          - http://localhost:3000
        AllowHeaders:
          - content-type
          - authorization
        AllowMethods:
          - GET
          - POST
          - PATCH
          - DELETE
          - OPTIONS

  ShopifyGetProductsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/getProducts.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/shopify/products

  ShopifyGetProductFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/getProduct.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/shopify/products/{productId}

  ShopifyGetCollectionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/getCollections.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/shopify/collections

  ShopifySearchCollectionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/searchCollections.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/shopify/collections/search

  ShopifySearchTaxonomyCategoriesFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/searchTaxonomyCategories.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/shopify/taxonomy-categories/search

  ShopifyResolveTaxonomyCategoryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/resolveTaxonomyCategory.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/shopify/taxonomy-categories/resolve

  ShopifyUpsertProductFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/upsertProduct.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/shopify/product-set

  ShopifyUpsertProductWithCollectionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/upsertProductWithCollections.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/shopify/product-set-with-collections

  ShopifyAddProductToCollectionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/addProductToCollections.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/shopify/products/{productId}/collections

  ShopifyUpdateProductCategoryFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/updateProductCategory.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/shopify/products/{productId}/category

  ShopifyUploadImageFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/shopify/uploadImage.handler
      Timeout: 30
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/shopify/images

  JotformGetFormsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/jotform/getForms.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/jotform/forms

  JotformGetFormSubmissionsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/jotform/getFormSubmissions.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/jotform/forms/{formId}/submissions

  AirtableGetListingsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/airtable/getListings.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/airtable/listings

  AirtableGetConfiguredRecordsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/airtable/getConfiguredRecords.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/airtable/configured-records

  AirtableGetConfiguredRecordFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/airtable/getConfiguredRecord.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/airtable/configured-records/{source}/{recordId}

  AirtableGetConfiguredMetadataFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/airtable/getConfiguredMetadata.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: GET
            Path: /api/airtable/configured-metadata

  AirtableCreateConfiguredRecordFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/airtable/upsertConfiguredRecord.createHandler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/airtable/configured-records/{source}

  AirtableUpdateConfiguredRecordFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/airtable/upsertConfiguredRecord.updateHandler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: PATCH
            Path: /api/airtable/configured-records/{source}/{recordId}

  AirtableDeleteConfiguredRecordFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/airtable/deleteConfiguredRecord.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: DELETE
            Path: /api/airtable/configured-records/{source}/{recordId}

  AirtableUploadConfiguredAttachmentFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/airtable/uploadConfiguredAttachment.handler
      Timeout: 30
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/airtable/configured-attachments/{source}/{recordId}/{fieldId}

  AiIdentifyEquipmentFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/ai/identifyEquipment.handler
      Timeout: 30
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/ai/identify-equipment

  GmailSendFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
    Properties:
      CodeUri: .
      Handler: src/handlers/gmail/send.handler
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref AppHttpApi
            Method: POST
            Path: /api/gmail/send

Outputs:
  AppApiUrl:
    Value: !Sub https://${AppHttpApi}.execute-api.${AWS::Region}.amazonaws.com